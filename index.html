<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="styles.css?v=2">

        <title>Document</title>
    </head>
    <body>

        <header>
            <nav>
                <!-- LOGO SECTION-->
                <section class="logo">
                    <h1>My Store</h1>
                </section>

                <!-- NAVIGATION SECTION -->
                     <ul>
                        <li class="nav-item">
                            <a class="nav-link" href="./index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./product-catalogue.html">Products</a>
                        </li>
                    </ul>

                <!-- CART SECTION -->
                <section>
                    <button class="btn btn-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#mySidebar" id="cart-total">
                    </button>
                    <div class="offcanvas offcanvas-end" id="mySidebar">
                        <div class="offcanvas-header">
                            <h5 class="offcanvas-title"></h5>
                            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                        </div>
                        <div class="offcanvas-body" id="cart-items">
                            <!-- Cart items will be dynamically generated here -->
                        </div>
                        <div class="offcanvas-footer">
                            <div id="grand-total"></div>
                            <button class="btn btn-primary" id="checkout-btn">Checkout</button>
                        </div>
                    </div>
                </section>
            </nav>
        </header>

        <main>
            <section class="hero">
                <h1>Welcome to My Store</h1>
                <p>Discover our amazing products and offers!</p>
            </section>

            
            <section class="user-login-form">
                <div class="alert alert-warning" role="alert"> This website is super fast because it uses caching and local storage!</div>
                <div id="user-dashboard"></div>
                <div id="user-login-logout"></div>
            </section>
        </main>
        
        <footer>
            <p>Copyright &copy; 2026</p>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="module" src="main.js"></script>
    </body>
</html>
